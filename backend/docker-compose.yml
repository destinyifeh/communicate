version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: communicate_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-communicate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-communicate_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-communicate}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-communicate}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: communicate_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
